name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        service:
          - ArticleService
          - CommentService
          - DraftService
          - ProfanityService

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ matrix.service }}-${{ hashFiles(format('src/{0}/**/*.csproj', matrix.service)) }}
          restore-keys: nuget-${{ matrix.service }}-

      - name: Restore
        run: dotnet restore src/${{ matrix.service }}

      - name: Build
        run: dotnet build src/${{ matrix.service }} --no-restore --configuration Release

  docker:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: ArticleService
            image: articleservice
          - service: CommentService
            image: commentservice
          - service: DraftService
            image: draftservice
          - service: ProfanityService
            image: profanityservice

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: src/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/happyheadlines-${{ matrix.image }}:latest
            ghcr.io/${{ env.OWNER_LC }}/happyheadlines-${{ matrix.image }}:${{ github.sha }}

  # ─────────────────────────────────────────────────────────────
