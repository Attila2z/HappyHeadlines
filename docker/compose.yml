services:

  # ===========================================================================
  # ARTICLE SERVICE — X-axis split (3 instances) + Z-axis split (8 databases)
  # ===========================================================================

  postgres-africa:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-africa:/var/lib/postgresql/data ]

  postgres-antarctica:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-antarctica:/var/lib/postgresql/data ]

  postgres-asia:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-asia:/var/lib/postgresql/data ]

  postgres-australia:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-australia:/var/lib/postgresql/data ]

  postgres-europe:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-europe:/var/lib/postgresql/data ]

  postgres-northamerica:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-northamerica:/var/lib/postgresql/data ]

  postgres-southamerica:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-southamerica:/var/lib/postgresql/data ]

  postgres-global:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-global:/var/lib/postgresql/data ]

  app1:
    build: { context: ../src/ArticleService, dockerfile: Dockerfile }
    restart: always
    environment:
      ConnectionStrings__Africa:       "Host=postgres-africa;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Antarctica:   "Host=postgres-antarctica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Asia:         "Host=postgres-asia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Australia:    "Host=postgres-australia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Europe:       "Host=postgres-europe;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__NorthAmerica: "Host=postgres-northamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__SouthAmerica: "Host=postgres-southamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Global:       "Host=postgres-global;Port=5432;Database=articles;Username=postgres;Password=postgres"
    depends_on: [ postgres-africa, postgres-antarctica, postgres-asia, postgres-australia, postgres-europe, postgres-northamerica, postgres-southamerica, postgres-global ]

  app2:
    build: { context: ../src/ArticleService, dockerfile: Dockerfile }
    restart: always
    environment:
      ConnectionStrings__Africa:       "Host=postgres-africa;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Antarctica:   "Host=postgres-antarctica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Asia:         "Host=postgres-asia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Australia:    "Host=postgres-australia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Europe:       "Host=postgres-europe;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__NorthAmerica: "Host=postgres-northamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__SouthAmerica: "Host=postgres-southamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Global:       "Host=postgres-global;Port=5432;Database=articles;Username=postgres;Password=postgres"
    depends_on: [ postgres-africa, postgres-antarctica, postgres-asia, postgres-australia, postgres-europe, postgres-northamerica, postgres-southamerica, postgres-global ]

  app3:
    build: { context: ../src/ArticleService, dockerfile: Dockerfile }
    restart: always
    environment:
      ConnectionStrings__Africa:       "Host=postgres-africa;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Antarctica:   "Host=postgres-antarctica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Asia:         "Host=postgres-asia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Australia:    "Host=postgres-australia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Europe:       "Host=postgres-europe;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__NorthAmerica: "Host=postgres-northamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__SouthAmerica: "Host=postgres-southamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Global:       "Host=postgres-global;Port=5432;Database=articles;Username=postgres;Password=postgres"
    depends_on: [ postgres-africa, postgres-antarctica, postgres-asia, postgres-australia, postgres-europe, postgres-northamerica, postgres-southamerica, postgres-global ]

  # ===========================================================================
  # PROFANITY SERVICE + DATABASE
  # ===========================================================================

  postgres-profanity:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: profanity }
    volumes: [ pgdata-profanity:/var/lib/postgresql/data ]

  profanityservice:
    build: { context: ../src/ProfanityService, dockerfile: Dockerfile }
    container_name: profanityservice
    restart: always
    depends_on: [ postgres-profanity ]

  # ===========================================================================
  # COMMENT SERVICE + DATABASE
  # CommentService calls ProfanityService directly (no gateway)
  # Circuit breaker handles ProfanityService being down
  # ===========================================================================

  postgres-comments:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: comments }
    volumes: [ pgdata-comments:/var/lib/postgresql/data ]

  commentservice:
    build: { context: ../src/CommentService, dockerfile: Dockerfile }
    container_name: commentservice
    restart: always
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres-comments;Port=5432;Database=comments;Username=postgres;Password=postgres"
      ProfanityService__BaseUrl: "http://profanityservice:8080"
    depends_on: [ postgres-comments, profanityservice ]
    ports:
      - "5001:8080"   # Access CommentService directly for testing

  # ===========================================================================
  # DRAFT SERVICE + DATABASE
  # ===========================================================================

  postgres-drafts:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: drafts }
    volumes: [ pgdata-drafts:/var/lib/postgresql/data ]

  draftservice:
    build: { context: ../src/DraftService, dockerfile: Dockerfile }
    container_name: draftservice
    restart: always
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres-drafts;Port=5432;Database=drafts;Username=postgres;Password=postgres"
    depends_on: [ postgres-drafts ]
    ports:
      - "5002:8080"   # Access DraftService directly for testing

  # ===========================================================================
  # NGINX — Load balancer for ArticleService
  # ===========================================================================

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    depends_on: [ app1, app2, app3 ]

  # ===========================================================================
  # ELK STACK — Centralized Logging & Monitoring Infrastructure
  # ===========================================================================

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: logstash
    restart: always
    ports:
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    volumes:
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    environment:
      - "LS_JAVA_OPTS=-Xmx256m -Xms256m"
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: kibana
    restart: always
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch

  log-cleanup:
    image: alpine:latest
    container_name: log-cleanup
    restart: always
    depends_on:
      - elasticsearch
    entrypoint: |
      /bin/sh -c "
      apk add --no-cache dcron curl &&
      echo '0 2 * * * curl -X DELETE http://elasticsearch:9200/logs-\$$(date -d 7 days ago +\\%Y.\\%m.\\%d) 2>/dev/null || true' | crontab - &&
      crond -f
      "

volumes:
  pgdata-africa:
  pgdata-antarctica:
  pgdata-asia:
  pgdata-australia:
  pgdata-europe:
  pgdata-northamerica:
  pgdata-southamerica:
  pgdata-global:
  pgdata-profanity:
  pgdata-comments:
  pgdata-drafts:
  esdata: