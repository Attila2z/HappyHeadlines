services:


  postgres-africa:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-africa:/var/lib/postgresql/data ]

  postgres-antarctica:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-antarctica:/var/lib/postgresql/data ]

  postgres-asia:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-asia:/var/lib/postgresql/data ]

  postgres-australia:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-australia:/var/lib/postgresql/data ]

  postgres-europe:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-europe:/var/lib/postgresql/data ]

  postgres-northamerica:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-northamerica:/var/lib/postgresql/data ]

  postgres-southamerica:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-southamerica:/var/lib/postgresql/data ]

  postgres-global:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: articles }
    volumes: [ pgdata-global:/var/lib/postgresql/data ]

  app1:
    build: { context: ../src/ArticleService, dockerfile: Dockerfile }
    restart: always
    environment:
      ConnectionStrings__Africa:       "Host=postgres-africa;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Antarctica:   "Host=postgres-antarctica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Asia:         "Host=postgres-asia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Australia:    "Host=postgres-australia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Europe:       "Host=postgres-europe;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__NorthAmerica: "Host=postgres-northamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__SouthAmerica: "Host=postgres-southamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Global:       "Host=postgres-global;Port=5432;Database=articles;Username=postgres;Password=postgres"
      Redis__ConnectionString:         "redis-article:6379"
    depends_on: [ postgres-africa, postgres-antarctica, postgres-asia, postgres-australia, postgres-europe, postgres-northamerica, postgres-southamerica, postgres-global, redis-article ]

  app2:
    build: { context: ../src/ArticleService, dockerfile: Dockerfile }
    restart: always
    environment:
      ConnectionStrings__Africa:       "Host=postgres-africa;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Antarctica:   "Host=postgres-antarctica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Asia:         "Host=postgres-asia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Australia:    "Host=postgres-australia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Europe:       "Host=postgres-europe;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__NorthAmerica: "Host=postgres-northamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__SouthAmerica: "Host=postgres-southamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Global:       "Host=postgres-global;Port=5432;Database=articles;Username=postgres;Password=postgres"
      Redis__ConnectionString:         "redis-article:6379"
    depends_on: [ postgres-africa, postgres-antarctica, postgres-asia, postgres-australia, postgres-europe, postgres-northamerica, postgres-southamerica, postgres-global, redis-article ]

  app3:
    build: { context: ../src/ArticleService, dockerfile: Dockerfile }
    restart: always
    environment:
      ConnectionStrings__Africa:       "Host=postgres-africa;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Antarctica:   "Host=postgres-antarctica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Asia:         "Host=postgres-asia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Australia:    "Host=postgres-australia;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Europe:       "Host=postgres-europe;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__NorthAmerica: "Host=postgres-northamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__SouthAmerica: "Host=postgres-southamerica;Port=5432;Database=articles;Username=postgres;Password=postgres"
      ConnectionStrings__Global:       "Host=postgres-global;Port=5432;Database=articles;Username=postgres;Password=postgres"
      Redis__ConnectionString:         "redis-article:6379"
    depends_on: [ postgres-africa, postgres-antarctica, postgres-asia, postgres-australia, postgres-europe, postgres-northamerica, postgres-southamerica, postgres-global, redis-article ]


  redis-article:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes: [ redisdata-article:/data ]


  postgres-profanity:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: profanity }
    volumes: [ pgdata-profanity:/var/lib/postgresql/data ]

  profanityservice:
    build: { context: ../src/ProfanityService, dockerfile: Dockerfile }
    container_name: profanityservice
    restart: always
    depends_on: [ postgres-profanity ]


  postgres-comments:
    image: postgres:16
    environment: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: comments }
    volumes: [ pgdata-comments:/var/lib/postgresql/data ]

  commentservice:
    build: { context: ../src/CommentService, dockerfile: Dockerfile }
    container_name: commentservice
    restart: always
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres-comments;Port=5432;Database=comments;Username=postgres;Password=postgres"
      ProfanityService__BaseUrl: "http://profanityservice:8080"
      Redis__ConnectionString: "redis-comment:6379"
    depends_on: [ postgres-comments, profanityservice, redis-comment ]
    ports:
      - "5001:8080"   


  redis-comment:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes: [ redisdata-comment:/data ]



  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
    depends_on: [ app1, app2, app3 ]

