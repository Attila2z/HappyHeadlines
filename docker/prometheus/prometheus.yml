global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: 'article-service'
    static_configs:
      - targets:
          - 'app1:8080'
          - 'app2:8080'
          - 'app3:8080'

  - job_name: 'comment-service'
    static_configs:
      - targets:
          - 'commentservice:8080'
