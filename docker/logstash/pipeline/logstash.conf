input {
  # TCP input for structured JSON logs
  tcp {
    port => 5000
    codec => json
    type => "app-logs"
    tags => ["tcp"]
  }

  # UDP input for structured JSON logs
  udp {
    port => 5000
    codec => json
    type => "app-logs"
    tags => ["udp"]
  }
}

filter {
  # Ensure timestamp exists for log retention
  if ![timestamp] {
    mutate {
      add_field => { "timestamp" => "%{@timestamp}" }
    }
  }

  # Add system metadata
  mutate {
    add_field => {
      "log_ingestion_time" => "%{@timestamp}"
      "environment" => "production"
    }

    # Remove redundant fields
    remove_field => [ "[host][os]" ]
  }

  # Parse common log fields
  if [service] {
    mutate {
      add_tag => [ "%{service}" ]
    }
  }

  # Detect error logs for easy filtering
  if [level] =~ /ERROR|FATAL|CRITICAL/ {
    mutate {
      add_tag => [ "error" ]
    }
  }

  # Detect warning logs
  if [level] == "WARN" {
    mutate {
      add_tag => [ "warning" ]
    }
  }
}

output {
  # Send logs to Elasticsearch with daily indices
  # Old indices (7+ days) are automatically deleted by the log-cleanup container
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    action => "create"
    doc_as_upsert => false
  }

  # Optional: also output to stdout for debugging (comment out in production)
  stdout {
    codec => rubydebug
  }
}

